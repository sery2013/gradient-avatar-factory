<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GradientAvatar Factory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0A0F19;
      color: #FFFFFF;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: rgba(18, 26, 38, 0.9);
      border: 1px solid #1E2A3A;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 15px;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
    }

    .logo span {
      color: #51CAD3;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav button {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid #1E2A3A;
      color: #A0B3C6;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav button:hover,
    .nav button.active {
      background: linear-gradient(135deg, #51CAD3, #97DEED);
      color: #0A0F19;
      border-color: #51CAD3;
    }

    .btn-connect {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid #51CAD3;
      color: #51CAD3;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-connect:hover {
      background: rgba(81, 202, 211, 0.1);
    }

    .content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: #121A26;
      border: 1px solid #1E2A3A;
      border-radius: 16px;
      padding: 24px;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .upload-zone {
      border: 2px dashed #1E2A3A;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(151, 222, 237, 0.03);
    }

    .upload-zone:hover {
      border-color: #51CAD3;
      background: rgba(81, 202, 211, 0.08);
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .style-btn {
      padding: 15px;
      background: #0A0F19;
      border: 2px solid #1E2A3A;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .style-btn:hover,
    .style-btn.active {
      border-color: #51CAD3;
      background: rgba(81, 202, 211, 0.1);
    }

    .style-preview {
      width: 100%;
      height: 60px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .cyberpunk { background: linear-gradient(135deg, #ff00ff, #00ffff); }
    .anime { background: linear-gradient(135deg, #ff6b9d, #c445ff); }
    .pixel { background: linear-gradient(135deg, #00ff9d, #00b8ff); }
    .minimal { background: linear-gradient(135deg, #a0a0a0, #ffffff); }

    textarea {
      width: 100%;
      padding: 12px;
      background: #0A0F19;
      border: 1px solid #1E2A3A;
      border-radius: 8px;
      color: #FFFFFF;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      margin: 10px 0;
    }

    textarea:focus {
      outline: none;
      border-color: #51CAD3;
    }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #51CAD3, #97DEED);
      border: none;
      border-radius: 8px;
      color: #0A0F19;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(81, 202, 211, 0.4);
    }

    .result-placeholder {
      text-align: center;
      padding: 60px 20px;
      color: #6B7F94;
    }

    .result-icon {
      font-size: 64px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      text-align: center;
      color: #6B7F94;
      border-top: 1px solid #1E2A3A;
    }

    footer a {
      color: #97DEED;
      text-decoration: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .content {
        grid-template-columns: 1fr;
      }
      
      .header-top {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div class="logo">Gradient<span>Avatar</span></div>
        <nav class="nav">
          <button class="active">✨ Create</button>
          <button>🖼️ Gallery</button>
          <button>🔐 Verify</button>
          <button>⚙️ Settings</button>
        </nav>
        <button class="btn-connect">🔗 Connect</button>
      </div>
    </header>

    <main class="content">
      <div class="card">
        <h2>🎨 Avatar Settings</h2>
        
        <div class="upload-zone">
          <div class="upload-icon">📁</div>
          <p><strong>Drop your photo</strong> or browse</p>
          <p style="color: #6B7F94; font-size: 14px; margin-top: 5px;">PNG, JPG up to 10MB</p>
        </div>

        <div style="margin: 20px 0;">
          <label style="display: block; margin-bottom: 10px; color: #A0B3C6;">Style Preset</label>
          <div class="style-grid">
            <button class="style-btn active">
              <div class="style-preview cyberpunk"></div>
              <div>Cyberpunk</div>
            </button>
            <button class="style-btn">
              <div class="style-preview anime"></div>
              <div>Anime</div>
            </button>
            <button class="style-btn">
              <div class="style-preview pixel"></div>
              <div>Pixel Art</div>
            </button>
            <button class="style-btn">
              <div class="style-preview minimal"></div>
              <div>Minimal</div>
            </button>
          </div>
        </div>

        <div>
          <label style="display: block; margin-bottom: 10px; color: #A0B3C6;">Custom Prompt (optional)</label>
          <textarea placeholder="e.g., neon lights, futuristic armor, holographic effects..."></textarea>
        </div>

        <button class="btn-generate">✨ Generate Avatar (~0.001 OPG)</button>
      </div>

      <div class="card">
        <h2>🖼️ Result</h2>
        <div class="result-placeholder">
          <div class="result-icon">🎭</div>
          <p>Your generated avatar will appear here</p>
        </div>
      </div>
    </main>

    <footer>
      <p>Built on <a href="https://opengradient.ai" target="_blank">OpenGradient</a></p>
      <p style="margin-top: 10px; font-size: 14px;">
        <a href="#">Docs</a> • 
        <a href="#">GitHub</a> • 
        <a href="#">Discord</a> • 
        <a href="#">Twitter</a>
      </p>
    </footer>
  </div>
</body>
</html>
