<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradientAvatar Factory | OpenGradient</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
background: #0A0F19;
color: #FFFFFF;
min-height: 100vh;
padding: 20px;
}
.container { max-width: 1000px; margin: 0 auto; }
header {
background: rgba(18, 26, 38, 0.9);
border: 1px solid #1E2A3A;
border-radius: 12px;
padding: 20px;
margin-bottom: 30px;
}
.header-top {
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 15px;
}
.logo { font-size: 24px; font-weight: 700; cursor: pointer; }
.logo:hover { transform: scale(1.02); }
.logo span { color: #51CAD3; }
.btn-connect {
padding: 10px 20px;
background: transparent;
border: 1px solid #51CAD3;
color: #51CAD3;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
}
.btn-connect:hover { background: rgba(81, 202, 211, 0.1); }
.btn-connect.connected {
background: rgba(81, 202, 211, 0.2);
border-color: #00ff9d;
color: #00ff9d;
}
.main-card {
background: #121A26;
border: 1px solid #1E2A3A;
border-radius: 16px;
padding: 30px;
margin-bottom: 20px;
}
.main-card h2 {
font-size: 22px;
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 10px;
}
.mode-tabs {
display: flex;
gap: 10px;
margin-bottom: 24px;
}
.mode-tab {
flex: 1;
padding: 12px;
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 8px;
color: #A0B3C6;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.mode-tab.active {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.1);
color: #51CAD3;
}
.upload-zone {
border: 2px dashed #1E2A3A;
border-radius: 12px;
padding: 50px 20px;
text-align: center;
cursor: pointer;
transition: all 0.3s;
background: rgba(151, 222, 237, 0.03);
margin-bottom: 24px;
display: none;
}
.upload-zone.show { display: block; }
.upload-zone:hover {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.08);
}
.upload-zone.has-image {
border-style: solid;
border-color: #51CAD3;
padding: 10px;
}
.upload-icon { font-size: 56px; margin-bottom: 12px; }
.preview-image {
max-width: 100%;
max-height: 250px;
border-radius: 8px;
display: none;
}
.upload-zone.has-image .upload-icon,
.upload-zone.has-image p { display: none; }
.upload-zone.has-image .preview-image { display: block; }
.section-title {
font-size: 16px;
color: #A0B3C6;
margin-bottom: 12px;
display: block;
}
.style-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
gap: 12px;
margin-bottom: 24px;
}
.style-btn {
padding: 10px;
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 8px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
font-size: 12px;
}
.style-btn:hover, .style-btn.active {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.1);
transform: translateY(-2px);
}
.style-preview {
width: 100%;
height: 45px;
border-radius: 4px;
margin-bottom: 6px;
}
textarea {
width: 100%;
padding: 14px;
background: #0A0F19;
border: 1px solid #1E2A3A;
border-radius: 8px;
color: #FFFFFF;
font-family: inherit;
resize: vertical;
min-height: 80px;
margin-bottom: 20px;
}
textarea:focus { outline: none; border-color: #51CAD3; }
.options-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 24px;
padding: 14px;
background: #0A0F19;
border-radius: 8px;
cursor: pointer;
}
.checkbox {
width: 20px;
height: 20px;
border: 2px solid #1E2A3A;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
}
.checkbox.checked {
background: #51CAD3;
border-color: #51CAD3;
}
.checkbox.checked::after {
content: '✓';
color: #0A0F19;
font-weight: bold;
}
.btn-generate {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, #51CAD3, #97DEED);
border: none;
border-radius: 10px;
color: #0A0F19;
font-weight: 700;
font-size: 16px;
cursor: pointer;
transition: all 0.3s;
}
.btn-generate:hover:not(:disabled) {
transform: translateY(-2px);
box-shadow: 0 8px 25px rgba(81, 202, 211, 0.4);
}
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
.result-section { display: none; }
.result-section.show { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
.result-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 20px;
}
.result-card {
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 12px;
padding: 16px;
text-align: center;
}
.result-card img {
max-width: 100%;
border-radius: 8px;
margin-bottom: 10px;
}
.result-actions {
display: flex;
gap: 12px;
flex-wrap: wrap;
}
.btn-action {
flex: 1;
min-width: 140px;
padding: 12px 20px;
background: transparent;
border: 1px solid #51CAD3;
color: #51CAD3;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.btn-action:hover { background: rgba(81, 202, 211, 0.1); }
.status-message {
padding: 14px;
border-radius: 8px;
margin-top: 16px;
display: none;
text-align: center;
}
.status-message.show { display: block; animation: slideIn 0.3s; }
@keyframes slideIn {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
.status-success {
background: rgba(0, 255, 157, 0.1);
border: 1px solid #00ff9d;
color: #00ff9d;
}
.status-error {
background: rgba(255, 107, 107, 0.1);
border: 1px solid #ff6b6b;
color: #ff6b6b;
}
.status-info {
background: rgba(81, 202, 211, 0.1);
border: 1px solid #51CAD3;
color: #51CAD3;
}
.loading-spinner {
display: inline-block;
width: 20px;
height: 20px;
border: 3px solid rgba(255,255,255,0.3);
border-radius: 50%;
border-top-color: #fff;
animation: spin 1s linear infinite;
margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
footer {
margin-top: 40px;
padding: 20px;
text-align: center;
color: #6B7F94;
border-top: 1px solid #1E2A3A;
}
footer a { color: #97DEED; text-decoration: none; }
@media (max-width: 768px) {
.result-grid { grid-template-columns: 1fr; }
.style-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="container">
<header>
<div class="header-top">
<div class="logo" id="siteLogo" onclick="location.reload()">
🎨 Gradient<span>Avatar</span> Factory
</div>
<button class="btn-connect" id="connectWalletBtn">🔗 Connect Wallet</button>
</div>
</header>

<div class="main-card">
<h2>🎨 Create Your AI Avatar</h2>

<!-- Mode Selection -->
<div class="mode-tabs">
<button class="mode-tab active" data-mode="text2img">📝 Text to Image</button>
<button class="mode-tab" data-mode="img2img">🖼️ Image to Image</button>
</div>

<!-- Upload Zone (for img2img) -->
<div class="upload-zone" id="uploadZone">
<input type="file" id="imageInput" accept="image/*" style="display: none;">
<div class="upload-icon">📁</div>
<p><strong>Upload your character photo</strong></p>
<p style="color: #6B7F94; font-size: 14px;">PNG, JPG up to 10MB</p>
<img id="previewImage" class="preview-image" alt="Preview">
</div>

<label class="section-title">Choose Style</label>
<div class="style-grid" id="styleGrid"></div>

<label class="section-title">Custom Prompt (REQUIRED)</label>
<textarea id="promptInput" placeholder="Example: cyberpunk frog character with neon lights, futuristic armor"></textarea>

<div class="options-row" id="watermarkOption">
<div class="checkbox" id="watermarkCheckbox"></div>
<div class="checkbox-label">
<strong>Add OpenGradient Watermark</strong>
<div style="color: #6B7F94; font-size: 13px;">Overlay "OPG" logo</div>
</div>
</div>

<button class="btn-generate" id="generateBtn">✨ Generate Avatar</button>
<div id="statusMessage" class="status-message"></div>
</div>

<div class="main-card result-section" id="resultSection">
<h2>✅ Generation Complete!</h2>
<div class="result-grid">
<div class="result-card" id="originalCard" style="display:none;">
<div style="color: #6B7F94; font-size: 13px; margin-bottom: 8px;">Original</div>
<img id="originalImage" alt="Original">
</div>
<div class="result-card">
<div style="color: #6B7F94; font-size: 13px; margin-bottom: 8px;">Generated Avatar</div>
<img id="generatedImage" alt="Generated">
<div style="color: #51CAD3; font-weight: 600; margin-top: 8px;" id="nftId">#0000</div>
</div>
</div>
<div class="result-actions">
<button class="btn-action" id="downloadBtn">📥 Download PNG</button>
<button class="btn-action" id="copyHashBtn">🔗 Copy Hash</button>
</div>
</div>

<footer>
<p>Powered by Pollinations AI & Leonardo.ai • Built for <a href="https://opengradient.ai" target="_blank">OpenGradient</a></p>
</footer>
</div>

<script>
var STYLES = [
{ id: 'cyberpunk', name: 'Cyberpunk', prompt: 'cyberpunk neon futuristic' },
{ id: 'anime', name: 'Anime', prompt: 'anime japanese animation' },
{ id: 'pixel', name: 'Pixel Art', prompt: 'pixel art 8bit retro' },
{ id: 'minimal', name: 'Minimal', prompt: 'minimalist clean modern' },
{ id: 'neon', name: 'Neon', prompt: 'neon glow electric' },
{ id: 'fantasy', name: 'Fantasy', prompt: 'fantasy magical mystical' },
{ id: 'scifi', name: 'Sci-Fi', prompt: 'science fiction futuristic' },
{ id: 'nature', name: 'Nature', prompt: 'nature organic earthy' }
];

var appState = {
mode: 'text2img',
walletConnected: false,
uploadedImage: null,
selectedStyle: 'cyberpunk',
addWatermark: false,
generatedData: null
};

document.addEventListener('DOMContentLoaded', function() {
renderStyleGrid();
setupEventListeners();
});

function renderStyleGrid() {
var grid = document.getElementById('styleGrid');
var html = '';
for (var i = 0; i < STYLES.length; i++) {
var s = STYLES[i];
var active = s.id === appState.selectedStyle ? 'active' : '';
html += '<button class="style-btn ' + active + '" data-style="' + s.id + '">';
html += '<div class="style-preview" style="background: linear-gradient(135deg, ' + s.gradient.join(', ') + ')"></div>';
html += '<div>' + s.name + '</div></button>';
}
grid.innerHTML = html;
}

function setupEventListeners() {
// Mode tabs
document.querySelectorAll('.mode-tab').forEach(function(tab) {
tab.addEventListener('click', function() {
document.querySelectorAll('.mode-tab').forEach(function(t) { t.classList.remove('active'); });
this.classList.add('active');
appState.mode = this.dataset.mode;
document.getElementById('uploadZone').classList.toggle('show', appState.mode === 'img2img');
});
});

// Upload
var uploadZone = document.getElementById('uploadZone');
var imageInput = document.getElementById('imageInput');
uploadZone.addEventListener('click', function() { imageInput.click(); });
uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = '#51CAD3'; });
uploadZone.addEventListener('dragleave', function() { this.style.borderColor = '#1E2A3A'; });
uploadZone.addEventListener('drop', function(e) {
e.preventDefault();
this.style.borderColor = '#1E2A3A';
handleImageUpload(e.dataTransfer.files[0]);
});
imageInput.addEventListener('change', function(e) { handleImageUpload(e.target.files[0]); });

// Style selection
document.getElementById('styleGrid').addEventListener('click', function(e) {
var btn = e.target.closest('.style-btn');
if (btn) {
document.querySelectorAll('.style-btn').forEach(function(b) { b.classList.remove('active'); });
btn.classList.add('active');
appState.selectedStyle = btn.dataset.style;
}
});

// Watermark
document.getElementById('watermarkOption').addEventListener('click', function() {
appState.addWatermark = !appState.addWatermark;
document.getElementById('watermarkCheckbox').classList.toggle('checked', appState.addWatermark);
});

// Generate
document.getElementById('generateBtn').addEventListener('click', handleGenerate);
document.getElementById('downloadBtn').addEventListener('click', handleDownload);
document.getElementById('copyHashBtn').addEventListener('click', handleCopyHash);
document.getElementById('connectWalletBtn').addEventListener('click', connectWallet);
}

function handleImageUpload(file) {
if (!file || !file.type.startsWith('image/')) { showStatus('Invalid image', 'error'); return; }
if (file.size > 10 * 1024 * 1024) { showStatus('Image too large (max 10MB)', 'error'); return; }
appState.uploadedImage = file;
var reader = new FileReader();
reader.onload = function(e) {
document.getElementById('previewImage').src = e.target.result;
document.getElementById('uploadZone').classList.add('has-image');
showStatus('✅ Image loaded!', 'success');
};
reader.readAsDataURL(file);
}

function handleGenerate() {
var prompt = document.getElementById('promptInput').value.trim();
if (!prompt) { showStatus('⚠️ Please enter a prompt', 'warning'); return; }
if (!appState.walletConnected) { showStatus('⚠️ Connect wallet first', 'warning'); return; }
if (appState.mode === 'img2img' && !appState.uploadedImage) {
showStatus('⚠️ Upload image first', 'warning'); return;
}

var btn = document.getElementById('generateBtn');
var originalText = btn.innerHTML;
btn.disabled = true;
btn.innerHTML = '<span class="loading-spinner"></span> Generating...';

var style = null;
for (var i = 0; i < STYLES.length; i++) {
if (STYLES[i].id === appState.selectedStyle) { style = STYLES[i]; break; }
}

showStatus('🤖 AI is generating... (15-30 seconds)', 'info');

fetch('/api/generate', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
prompt: prompt,
style: style.prompt,
mode: appState.mode,
imageUrl: appState.uploadedImage ? null : ''
})
})
.then(function(res) { return res.json(); })
.then(function(data) {
if (data.error) throw new Error(data.error);
return addWatermark(data.imageUrl);
})
.then(function(processedUrl) {
var nftId = '#' + (Math.floor(Math.random() * 9000) + 1000).toString().padStart(4, '0');
var txHash = '0x' + Array(64).fill(0).map(function() { return Math.floor(Math.random() * 16).toString(16); }).join('');

appState.generatedData = {
originalUrl: appState.uploadedImage ? URL.createObjectURL(appState.uploadedImage) : null,
generatedUrl: processedUrl,
nftId: nftId,
txHash: txHash
};

if (appState.mode === 'img2img') {
document.getElementById('originalCard').style.display = 'block';
document.getElementById('originalImage').src = appState.generatedData.originalUrl;
}

document.getElementById('generatedImage').src = processedUrl;
document.getElementById('nftId').textContent = nftId;
document.getElementById('resultSection').classList.add('show');
document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

showStatus('✅ Generated successfully!', 'success');
btn.innerHTML = originalText;
btn.disabled = false;
})
.catch(function(error) {
console.error('Error:', error);
showStatus('❌ ' + error.message, 'error');
btn.innerHTML = originalText;
btn.disabled = false;
});
}

function addWatermark(imageUrl) {
return new Promise(function(resolve) {
if (!appState.addWatermark) { resolve(imageUrl); return; }
var img = new Image();
img.crossOrigin = 'anonymous';
img.onload = function() {
var canvas = document.createElement('canvas');
canvas.width = img.width;
canvas.height = img.height;
var ctx = canvas.getContext('2d');
ctx.drawImage(img, 0, 0);
ctx.save();
ctx.globalAlpha = 0.35;
ctx.fillStyle = '#51CAD3';
ctx.font = 'bold 48px Inter, sans-serif';
ctx.textAlign = 'right';
ctx.textBaseline = 'bottom';
ctx.fillText('OPG', canvas.width - 20, canvas.height - 20);
ctx.restore();
resolve(canvas.toDataURL('image/png'));
};
img.onerror = function() { resolve(imageUrl); };
img.src = imageUrl;
});
}

function handleDownload() {
if (!appState.generatedData) return;
var link = document.createElement('a');
link.download = 'gradient-avatar-' + appState.generatedData.nftId + '.png';
link.href = appState.generatedData.generatedUrl;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showStatus('📥 Download started!', 'success');
}

function handleCopyHash() {
if (!appState.generatedData) return;
navigator.clipboard.writeText(appState.generatedData.txHash)
.then(function() { showStatus('🔗 Hash copied!', 'success'); })
.catch(function() { showStatus('❌ Copy failed', 'error'); });
}

function connectWallet() {
var btn = document.getElementById('connectWalletBtn');
if (typeof window.ethereum === 'undefined') {
showStatus('❌ Install MetaMask', 'error');
window.open('https://metamask.io', '_blank');
return;
}
showStatus('Connecting...', 'info');
window.ethereum.request({ method: 'eth_requestAccounts' })
.then(function(accounts) { return window.ethereum.request({ method: 'eth_chainId' }); })
.then(function(chainId) {
if (chainId !== '0x14a34') {
return window.ethereum.request({
method: 'wallet_switchEthereumChain',
params: [{ chainId: '0x14a34' }]
});
}
})
.then(function() {
appState.walletConnected = true;
btn.textContent = '✅ Connected';
btn.classList.add('connected');
showStatus('✅ Wallet connected!', 'success');
})
.catch(function(error) {
console.error(error);
showStatus('❌ Connection failed', 'error');
});
}

function showStatus(msg, type) {
var el = document.getElementById('statusMessage');
el.innerHTML = msg;
el.className = 'status-message status-' + type + ' show';
if (type !== 'error') setTimeout(function() { el.classList.remove('show'); }, 6000);
}
</script>
</body>
</html>
