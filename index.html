<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradientAvatar Factory | OpenGradient</title>
<style>
    /* === СТИЛИ (Дизайн сохранен) === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        background: #0A0F19; color: #FFFFFF; min-height: 100vh; padding: 20px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    header {
        background: rgba(18, 26, 38, 0.9); border: 1px solid #1E2A3A;
        border-radius: 12px; padding: 20px; margin-bottom: 30px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 24px; font-weight: 700; cursor: pointer; }
    .logo span { color: #51CAD3; }
    .engine-badge { color: #51CAD3; font-size: 11px; font-weight: 700; border: 1px solid rgba(81, 202, 211, 0.3); padding: 6px 14px; border-radius: 20px; background: rgba(81, 202, 211, 0.05); }

    .main-card { background: #121A26; border: 1px solid #1E2A3A; border-radius: 16px; padding: 30px; margin-bottom: 20px; }
    .mode-tabs { display: flex; gap: 10px; margin-bottom: 24px; }
    .mode-tab {
        flex: 1; padding: 12px; background: #0A0F19; border: 2px solid #1E2A3A;
        border-radius: 8px; color: #A0B3C6; cursor: pointer; font-weight: 600; text-align: center;
    }
    .mode-tab.active { border-color: #51CAD3; background: rgba(81, 202, 211, 0.1); color: #51CAD3; }

    .upload-zone {
        border: 2px dashed #1E2A3A; border-radius: 12px; padding: 40px;
        text-align: center; cursor: pointer; margin-bottom: 24px; display: none;
    }
    .upload-zone.show { display: block; }
    .preview-image { max-width: 100%; max-height: 250px; border-radius: 8px; display: none; margin: 10px auto; }
    .upload-zone.has-image .preview-image { display: block; }
    .upload-zone.has-image p, .upload-zone.has-image .upload-icon { display: none; }

    .style-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin: 15px 0 25px; }
    .style-btn {
        padding: 10px; background: #0A0F19; border: 2px solid #1E2A3A;
        border-radius: 8px; cursor: pointer; color: white; font-size: 12px;
    }
    .style-btn.active { border-color: #51CAD3; background: rgba(81, 202, 211, 0.1); }
    .style-preview { width: 100%; height: 40px; border-radius: 4px; margin-bottom: 8px; }

    textarea {
        width: 100%; padding: 16px; background: #0A0F19; border: 1px solid #1E2A3A;
        border-radius: 12px; color: #FFFFFF; min-height: 100px; margin-bottom: 20px; resize: none;
    }
    .btn-generate {
        width: 100%; padding: 18px; background: linear-gradient(135deg, #51CAD3, #97DEED);
        border: none; border-radius: 12px; color: #0A0F19; font-weight: 800; cursor: pointer;
    }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-section { display: none; margin-top: 20px; text-align: center; }
    .result-section.show { display: block; }
    .result-card img { max-width: 100%; border-radius: 12px; margin-bottom: 20px; border: 2px solid #1E2A3A; }

    .status-message { padding: 16px; border-radius: 10px; margin-top: 20px; display: none; text-align: center; font-weight: 600; }
    .status-message.show { display: block; }
    .status-success { background: rgba(0, 255, 157, 0.1); border: 1px solid #00ff9d; color: #00ff9d; }
    .status-error { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff6b6b; }

    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.1); border-top-color: #0A0F19; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo" onclick="location.reload()">🎨 Gradient<span>Avatar</span></div>
        <div class="engine-badge">LEONARDO AI ASYNC</div>
    </header>

    <div class="main-card">
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="text2img">📝 Text</button>
            <button class="mode-tab" data-mode="img2img">🖼️ Image</button>
        </div>

        <div class="upload-zone" id="uploadZone">
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <div class="upload-icon" style="font-size: 40px;">📁</div>
            <p>Upload Reference</p>
            <img id="previewImage" class="preview-image">
        </div>

        <p style="color: #6B7F94; font-size: 14px;">Style Selection</p>
        <div class="style-grid" id="styleGrid"></div>

        <textarea id="promptInput" placeholder="Describe your avatar..."></textarea>

        <button class="btn-generate" id="generateBtn">✨ Start Generation</button>
        <div id="statusMessage" class="status-message"></div>
    </div>

    <div class="main-card result-section" id="resultSection">
        <div class="result-card">
            <img id="generatedImage">
            <button class="btn-generate" style="width: auto; padding: 12px 30px;" onclick="downloadImg()">📥 Download</button>
        </div>
    </div>
</div>

<script>
const STYLES = [
    { id: 'cyberpunk', name: 'Cyberpunk', gradient: ['#ff00ff', '#00ffff'] },
    { id: 'anime', name: 'Anime', gradient: ['#ff6b9d', '#c445ff'] },
    { id: 'pixel', name: 'Pixel Art', gradient: ['#00ff9d', '#00b8ff'] },
    { id: 'neon', name: 'Neon', gradient: ['#39ff14', '#ff00ff'] },
    { id: 'fantasy', name: 'Fantasy', gradient: ['#5f27cd', '#341f97'] }
];

let state = { mode: 'text2img', style: 'cyberpunk', image: null };

// Инициализация
document.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('styleGrid');
    STYLES.forEach(s => {
        grid.innerHTML += `
            <button class="style-btn ${s.id === state.style ? 'active' : ''}" onclick="state.style='${s.id}'; updateStyleUI()" id="btn-${s.id}">
                <div class="style-preview" style="background: linear-gradient(135deg, ${s.gradient.join(',')})"></div>
                ${s.name}
            </button>`;
    });
});

function updateStyleUI() {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + state.style).classList.add('active');
}

// Режимы
document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.onclick = function() {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        state.mode = this.dataset.mode;
        document.getElementById('uploadZone').classList.toggle('show', state.mode === 'img2img');
    };
});

// Загрузка фото
const imgInput = document.getElementById('imageInput');
document.getElementById('uploadZone').onclick = () => imgInput.click();
imgInput.onchange = (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
        state.image = ev.target.result;
        document.getElementById('previewImage').src = ev.target.result;
        document.getElementById('uploadZone').classList.add('has-image');
    };
    reader.readAsDataURL(file);
};

// --- ГЛАВНАЯ ЛОГИКА ---
document.getElementById('generateBtn').onclick = async function() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return showStatus('Enter prompt!', 'error');

    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Task Sent...';

    try {
        // 1. Отправляем запрос на создание (это быстро)
        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt, style: state.style, mode: state.mode, imageUrl: state.image })
        });
        const startData = await res.json();
        if (!startData.success) throw new Error(startData.error || 'Server error');

        const genId = startData.generationId;
        let attempts = 0;

        // 2. Опрашиваем сервер о готовности (Polling)
        const poll = async () => {
            attempts++;
            btn.innerHTML = `<span class="spinner"></span> AI Working... (${attempts*3}s)`;
            
            const check = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ checkId: genId })
            });
            const data = await check.json();

            if (data.status === 'COMPLETE') {
                document.getElementById('generatedImage').src = data.imageUrl;
                document.getElementById('resultSection').classList.add('show');
                showStatus('Success!', 'success');
                btn.disabled = false;
                btn.innerHTML = '✨ Start Generation';
            } else if (data.status === 'FAILED') {
                throw new Error('Leonardo failed generation');
            } else if (attempts > 30) {
                throw new Error('Timeout');
            } else {
                setTimeout(poll, 3000); // Ждем 3 секунды и снова
            }
        };

        poll();

    } catch (e) {
        showStatus('Error: ' + e.message, 'error');
        btn.disabled = false;
        btn.innerHTML = '✨ Start Generation';
    }
};

function showStatus(msg, type) {
    const el = document.getElementById('statusMessage');
    el.innerHTML = msg;
    el.className = `status-message status-${type} show`;
    setTimeout(() => el.classList.remove('show'), 5000);
}

function downloadImg() {
    const link = document.createElement('a');
    link.href = document.getElementById('generatedImage').src;
    link.download = 'avatar.png';
    link.click();
}
</script>
</body>
</html>
