<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GradientAvatar Factory | OpenGradient</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ВСЕ СТИЛИ ЗДЕСЬ - скопируйте из main.css, components.css, animations.css */
    :root {
      --og-primary: #51CAD3;
      --og-primary-glow: rgba(81, 202, 211, 0.4);
      --og-secondary: #97DEED;
      --og-dark: #0A0F19;
      --og-dark-elevated: #121A26;
      --og-dark-border: #1E2A3A;
      --gradient-primary: linear-gradient(135deg, #51CAD3 0%, #97DEED 100%);
      --text-primary: #FFFFFF;
      --text-secondary: #A0B3C6;
      --text-muted: #6B7F94;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-full: 9999px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--og-dark);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    /* Добавьте остальные стили из components.css сюда */
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    
    .header {
      background: rgba(10, 15, 25, 0.95);
      border-bottom: 1px solid var(--og-dark-border);
      padding: 16px 0;
      margin-bottom: 32px;
    }
    
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .logo-accent {
      color: var(--og-primary);
    }
    
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .nav-btn {
      padding: 8px 16px;
      background: var(--og-dark-elevated);
      border: 1px solid var(--og-dark-border);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }
    
    .nav-btn:hover,
    .nav-btn.active {
      background: var(--gradient-primary);
      color: var(--og-dark);
      border-color: var(--og-primary);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }
    
    .btn-primary {
      background: var(--gradient-primary);
      color: var(--og-dark);
    }
    
    .btn-primary:hover {
      box-shadow: 0 0 20px rgba(81, 202, 211, 0.4);
      transform: translateY(-2px);
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid var(--og-primary);
      color: var(--og-primary);
    }
    
    .card {
      background: var(--og-dark-elevated);
      border: 1px solid var(--og-dark-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .card-title {
      font-size: 1.25rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .upload-zone {
      border: 2px dashed var(--og-dark-border);
      border-radius: var(--radius-md);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      background: rgba(151, 222, 237, 0.03);
    }
    
    .upload-zone:hover {
      border-color: var(--og-primary);
      background: rgba(81, 202, 211, 0.08);
    }
    
    .style-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 16px 0;
    }
    
    .style-btn {
      padding: 12px;
      background: var(--og-dark);
      border: 2px solid var(--og-dark-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: 0.2s;
    }
    
    .style-btn.active,
    .style-btn:hover {
      border-color: var(--og-primary);
      background: rgba(81, 202, 211, 0.1);
    }
    
    .input-field {
      width: 100%;
      padding: 12px;
      background: var(--og-dark);
      border: 1px solid var(--og-dark-border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: inherit;
      margin: 8px 0;
    }
    
    .input-field:focus {
      outline: none;
      border-color: var(--og-primary);
    }
    
    .tab-panel {
      display: none;
    }
    
    .tab-panel.active {
      display: block;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .status-message {
      padding: 12px;
      border-radius: var(--radius-md);
      margin-top: 12px;
      display: none;
    }
    
    .status-message.show {
      display: block;
    }
    
    .status-success {
      background: rgba(0, 255, 157, 0.1);
      border: 1px solid #00ff9d;
      color: #00ff9d;
    }
    
    .status-error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
    }
    
    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
      
      .header-inner {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <!-- Ваш HTML контент -->
</body>
</html>
