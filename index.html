<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradientAvatar Factory | Leonardo.ai</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
background: #0A0F19;
color: #FFFFFF;
min-height: 100vh;
padding: 20px;
}
.container { max-width: 1000px; margin: 0 auto; }
header {
background: rgba(18, 26, 38, 0.9);
border: 1px solid #1E2A3A;
border-radius: 12px;
padding: 20px;
margin-bottom: 30px;
}
.header-top {
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 15px;
}
.logo {
font-size: 24px;
font-weight: 700;
cursor: pointer;
transition: all 0.2s;
}
.logo:hover {
transform: scale(1.02);
text-shadow: 0 0 20px rgba(81, 202, 211, 0.5);
}
.logo span { color: #51CAD3; }
.btn-connect {
padding: 10px 20px;
background: transparent;
border: 1px solid #51CAD3;
color: #51CAD3;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.btn-connect:hover { background: rgba(81, 202, 211, 0.1); }
.btn-connect.connected {
background: rgba(81, 202, 211, 0.2);
border-color: #00ff9d;
color: #00ff9d;
}
.main-card {
background: #121A26;
border: 1px solid #1E2A3A;
border-radius: 16px;
padding: 30px;
margin-bottom: 20px;
}
.main-card h2 {
font-size: 22px;
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 10px;
}
.mode-tabs {
display: flex;
gap: 10px;
margin-bottom: 24px;
}
.mode-tab {
flex: 1;
padding: 12px;
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 8px;
color: #A0B3C6;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.mode-tab.active {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.1);
color: #51CAD3;
}
.upload-zone {
border: 2px dashed #1E2A3A;
border-radius: 12px;
padding: 50px 20px;
text-align: center;
cursor: pointer;
transition: all 0.3s;
background: rgba(151, 222, 237, 0.03);
margin-bottom: 24px;
display: none;
}
.upload-zone.show { display: block; }
.upload-zone:hover {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.08);
}
.upload-zone.has-image {
border-style: solid;
border-color: #51CAD3;
padding: 10px;
}
.upload-icon { font-size: 56px; margin-bottom: 12px; }
.preview-image {
max-width: 100%;
max-height: 250px;
border-radius: 8px;
display: none;
}
.upload-zone.has-image .upload-icon,
.upload-zone.has-image p { display: none; }
.upload-zone.has-image .preview-image { display: block; }
.section-title {
font-size: 16px;
color: #A0B3C6;
margin-bottom: 12px;
display: block;
}
.style-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
gap: 12px;
margin-bottom: 24px;
}
.style-btn {
padding: 10px;
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 8px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
font-size: 12px;
}
.style-btn:hover, .style-btn.active {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.1);
transform: translateY(-2px);
}
.style-preview {
width: 100%;
height: 45px;
border-radius: 4px;
margin-bottom: 6px;
}
textarea {
width: 100%;
padding: 14px;
background: #0A0F19;
border: 1px solid #1E2A3A;
border-radius: 8px;
color: #FFFFFF;
font-family: inherit;
resize: vertical;
min-height: 80px;
margin-bottom: 20px;
}
textarea:focus { outline: none; border-color: #51CAD3; }
.options-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 24px;
padding: 14px;
background: #0A0F19;
border-radius: 8px;
cursor: pointer;
}
.checkbox {
width: 20px;
height: 20px;
border: 2px solid #1E2A3A;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
flex-shrink: 0;
}
.checkbox.checked {
background: #51CAD3;
border-color: #51CAD3;
}
.checkbox.checked::after {
content: '✓';
color: #0A0F19;
font-weight: bold;
}
.btn-generate {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, #51CAD3, #97DEED);
border: none;
border-radius: 10px;
color: #0A0F19;
font-weight: 700;
font-size: 16px;
cursor: pointer;
transition: all 0.3s;
}
.btn-generate:hover:not(:disabled) {
transform: translateY(-2px);
box-shadow: 0 8px 25px rgba(81, 202, 211, 0.4);
}
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
.result-section { display: none; }
.result-section.show { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
.result-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 20px;
}
.result-card {
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 12px;
padding: 16px;
text-align: center;
}
.result-card img {
max-width: 100%;
border-radius: 8px;
margin-bottom: 10px;
}
.result-actions {
display: flex;
gap: 12px;
flex-wrap: wrap;
}
.btn-action {
flex: 1;
min-width: 140px;
padding: 12px 20px;
background: transparent;
border: 1px solid #51CAD3;
color: #51CAD3;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.btn-action:hover { background: rgba(81, 202, 211, 0.1); }
.status-message {
padding: 14px;
border-radius: 8px;
margin-top: 16px;
display: none;
text-align: center;
}
.status-message.show { display: block; animation: slideIn 0.3s; }
@keyframes slideIn {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
.status-success {
background: rgba(0, 255, 157, 0.1);
border: 1px solid #00ff9d;
color: #00ff9d;
}
.status-error {
background: rgba(255, 107, 107, 0.1);
border: 1px solid #ff6b6b;
color: #ff6b6b;
}
.status-info {
background: rgba(81, 202, 211, 0.1);
border: 1px solid #51CAD3;
color: #51CAD3;
}
.loading-spinner {
display: inline-block;
width: 20px;
height: 20px;
border: 3px solid rgba(255,255,255,0.3);
border-radius: 50%;
border-top-color: #fff;
animation: spin 1s linear infinite;
margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
footer {
margin-top: 40px;
padding: 20px;
text-align: center;
color: #6B7F94;
border-top: 1px solid #1E2A3A;
}
footer a { color: #97DEED; text-decoration: none; }
@media (max-width: 768px) {
.result-grid { grid-template-columns: 1fr; }
.style-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="container">
<header>
<div class="header-top">
<div class="logo" id="siteLogo" title="Click to refresh">
🎨 Gradient<span>Avatar</span> Factory
</div>
<button class="btn-connect" id="connectWalletBtn">🔗 Connect Wallet</button>
</div>
</header>
<div class="main-card">
<h2>🎨 Leonardo.ai Generator</h2>
<!-- Mode Selection -->
<div class="mode-tabs">
<button class="mode-tab active" data-mode="text2img">📝 Text to Image</button>
<button class="mode-tab" data-mode="img2img">🖼️ Image to Image</button>
</div>
<!-- Upload Zone (for img2img) -->
<div class="upload-zone" id="uploadZone">
<input type="file" id="imageInput" accept="image/*" style="display: none;">
<div class="upload-icon">📁</div>
<p><strong>Upload your image</strong></p>
<p style="color: #6B7F94; font-size: 14px;">PNG, JPG up to 10MB</p>
<img id="previewImage" class="preview-image" alt="Preview">
</div>
<label class="section-title">Choose Style (optional)</label>
<div class="style-grid" id="styleGrid"></div>
<label class="section-title">Custom Prompt (REQUIRED)</label>
<textarea id="promptInput" placeholder="Example: cyberpunk frog character with neon lights, futuristic armor"></textarea>
<div class="options-row" id="watermarkOption">
<div class="checkbox" id="watermarkCheckbox"></div>
<div class="checkbox-label">
<strong>Add OpenGradient Watermark</strong>
<div style="color: #6B7F94; font-size: 13px;">Overlay "OPG" logo</div>
</div>
</div>
<button class="btn-generate" id="generateBtn">✨ Generate Image</button>
<div id="statusMessage" class="status-message"></div>
</div>
<div class="main-card result-section" id="resultSection">
<h2>✅ Generation Complete!</h2>
<div class="result-grid">
<div class="result-card" id="originalCard" style="display:none;">
<div style="color: #6B7F94; font-size: 13px; margin-bottom: 8px;">Original</div>
<img id="originalImage" alt="Original">
</div>
<div class="result-card">
<div style="color: #6B7F94; font-size: 13px; margin-bottom: 8px;">Generated</div>
<img id="generatedImage" alt="Generated">
<div style="color: #51CAD3; font-weight: 600; margin-top: 8px;" id="nftId">#0000</div>
</div>
</div>
<div class="result-actions">
<button class="btn-action" id="downloadBtn">📥 Download PNG</button>
<button class="btn-action" id="copyHashBtn">🔗 Copy Hash</button>
</div>
<div id="mintStatus" class="status-message"></div>
</div>
<footer>
<p>Powered by <a href="https://leonardo.ai" target="_blank">Leonardo.ai</a> • Built for <a href="https://opengradient.ai" target="_blank">OpenGradient</a></p>
<p style="margin-top: 8px;">Text-to-Image & Image-to-Image • Base Sepolia</p>
</footer>
</div>
<script>
// === КОНФИГУРАЦИЯ ===
var STYLES = [
{ id: 'cyberpunk', name: 'Cyberpunk', prompt: 'cyberpunk, neon lights, futuristic, high tech' },
{ id: 'anime', name: 'Anime', prompt: 'anime style, japanese animation, vibrant colors' },
{ id: 'pixel', name: 'Pixel Art', prompt: 'pixel art, 8-bit, retro gaming' },
{ id: 'minimal', name: 'Minimal', prompt: 'minimalist, clean lines, modern' },
{ id: 'neon', name: 'Neon', prompt: 'neon colors, glowing, electric' },
{ id: 'retro', name: 'Retro', prompt: 'retro, vintage, 80s aesthetic' },
{ id: 'fantasy', name: 'Fantasy', prompt: 'fantasy, magical, mystical' },
{ id: 'scifi', name: 'Sci-Fi', prompt: 'science fiction, futuristic, space' },
{ id: 'noir', name: 'Noir', prompt: 'film noir, black and white, dramatic' },
{ id: 'vaporwave', name: 'Vaporwave', prompt: 'vaporwave, pastel, retro futuristic' },
{ id: 'nature', name: 'Nature', prompt: 'nature, organic, earthy' },
{ id: 'sunset', name: 'Sunset', prompt: 'sunset, warm tones, golden hour' },
{ id: 'ocean', name: 'Ocean', prompt: 'ocean, waves, deep blue' },
{ id: 'fire', name: 'Fire', prompt: 'fire, flames, burning, intense' },
{ id: 'galaxy', name: 'Galaxy', prompt: 'galaxy, stars, cosmic, nebula' },
{ id: 'forest', name: 'Forest', prompt: 'forest, green, nature, peaceful' },
{ id: 'cosmic', name: 'Cosmic', prompt: 'cosmic, purple, ethereal' },
{ id: 'gold', name: 'Gold', prompt: 'golden, luxury, elegant, metallic' }
];
var appState = {
mode: 'text2img',
walletConnected: false,
uploadedImage: null,
uploadedImageBase64: null,
selectedStyle: null,
addWatermark: false,
generatedData: null
};
// === ИНИЦИАЛИЗАЦИЯ ===
document.addEventListener('DOMContentLoaded', function() {
renderStyleGrid();
setupEventListeners();
console.log('✅ GradientAvatar Factory loaded!');
console.log('🎨 Using Leonardo.ai via Vercel API');
});
document.getElementById('siteLogo').addEventListener('click', function() {
location.reload();
});
function renderStyleGrid() {
var grid = document.getElementById('styleGrid');
var html = '';
for (var i = 0; i < STYLES.length; i++) {
var style = STYLES[i];
var active = appState.selectedStyle === style.id ? 'active' : '';
html += '<button class="style-btn ' + active + '" data-style="' + style.id + '">';
html += '<div class="style-preview" style="background: linear-gradient(135deg, ' + style.gradient.join(', ') + ')"></div>';
html += '<div>' + style.name + '</div></button>';
}
grid.innerHTML = html;
}
function setupEventListeners() {
// Mode tabs
var modeTabs = document.querySelectorAll('.mode-tab');
for (var i = 0; i < modeTabs.length; i++) {
modeTabs[i].addEventListener('click', function() {
for (var j = 0; j < modeTabs.length; j++) {
modeTabs[j].classList.remove('active');
}
this.classList.add('active');
appState.mode = this.dataset.mode;
var uploadZone = document.getElementById('uploadZone');
if (appState.mode === 'img2img') {
uploadZone.classList.add('show');
} else {
uploadZone.classList.remove('show');
}
});
}
// Upload
var uploadZone = document.getElementById('uploadZone');
var imageInput = document.getElementById('imageInput');
uploadZone.addEventListener('click', function() { imageInput.click(); });
uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = '#51CAD3'; });
uploadZone.addEventListener('dragleave', function() { this.style.borderColor = '#1E2A3A'; });
uploadZone.addEventListener('drop', function(e) {
e.preventDefault();
this.style.borderColor = '#1E2A3A';
handleImageUpload(e.dataTransfer.files[0]);
});
imageInput.addEventListener('change', function(e) { handleImageUpload(e.target.files[0]); });
// Style selection
document.getElementById('styleGrid').addEventListener('click', function(e) {
var btn = e.target.closest('.style-btn');
if (btn) {
var buttons = document.querySelectorAll('.style-btn');
for (var i = 0; i < buttons.length; i++) { buttons[i].classList.remove('active'); }
btn.classList.add('active');
appState.selectedStyle = btn.dataset.style;
}
});
// Watermark
document.getElementById('watermarkOption').addEventListener('click', function() {
appState.addWatermark = !appState.addWatermark;
var checkbox = document.getElementById('watermarkCheckbox');
if (appState.addWatermark) { checkbox.classList.add('checked'); }
else { checkbox.classList.remove('checked'); }
});
// Generate
document.getElementById('generateBtn').addEventListener('click', handleGenerate);
document.getElementById('downloadBtn').addEventListener('click', handleDownload);
document.getElementById('copyHashBtn').addEventListener('click', handleCopyHash);
document.getElementById('connectWalletBtn').addEventListener('click', connectWallet);
}
function handleImageUpload(file) {
if (!file || !file.type.startsWith('image/')) { showStatus('Please select a valid image', 'error'); return; }
if (file.size > 10 * 1024 * 1024) { showStatus('Image must be under 10MB', 'error'); return; }
appState.uploadedImage = file;
var reader = new FileReader();
reader.onload = function(e) {
document.getElementById('previewImage').src = e.target.result;
document.getElementById('uploadZone').classList.add('has-image');
appState.uploadedImageBase64 = e.target.result.split(',')[1];
showStatus('✅ Image loaded! Ready for Image-to-Image', 'success');
};
reader.readAsDataURL(file);
}
// === ГЕНЕРАЦИЯ ЧЕРЕЗ VERCEL API ===
function generateViaAPI() {
return new Promise(function(resolve, reject) {
var prompt = document.getElementById('promptInput').value.trim();
if (!prompt) { reject(new Error('Please enter a prompt')); return; }
var stylePrompt = '';
if (appState.selectedStyle) {
for (var i = 0; i < STYLES.length; i++) {
if (STYLES[i].id === appState.selectedStyle) {
stylePrompt = STYLES[i].prompt;
break;
}
}
}
console.log('🎨 Calling Vercel API...');
console.log('Mode:', appState.mode);
console.log('Prompt:', prompt);
showStatus('🤖 AI is generating... (30-60 seconds)', 'info');
fetch('/api/generate', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
mode: appState.mode,
prompt: prompt,
style: stylePrompt,
imageBase64: appState.uploadedImageBase64
})
})
.then(function(res) { return res.json(); })
.then(function(data) {
if (data.error) { reject(new Error(data.error)); return; }
console.log('✅ Generated via Leonardo.ai!');
resolve(data.imageUrl);
})
.catch(function(error) {
console.error('API error:', error);
reject(error);
});
});
}
// === ВОДЯНОЙ ЗНАК ===
function addWatermark(imageUrl) {
return new Promise(function(resolve) {
var img = new Image();
img.crossOrigin = 'anonymous';
img.onload = function() {
var canvas = document.createElement('canvas');
canvas.width = img.width;
canvas.height = img.height;
var ctx = canvas.getContext('2d');
ctx.drawImage(img, 0, 0);
if (appState.addWatermark) {
ctx.save();
ctx.globalAlpha = 0.35;
ctx.fillStyle = '#51CAD3';
ctx.font = 'bold 48px Inter, sans-serif';
ctx.textAlign = 'right';
ctx.textBaseline = 'bottom';
ctx.fillText('OPG', canvas.width - 20, canvas.height - 20);
ctx.restore();
}
resolve(canvas.toDataURL('image/png'));
};
img.onerror = function() { resolve(imageUrl); };
img.src = imageUrl;
});
}
// === ГЛАВНАЯ ФУНКЦИЯ ===
function handleGenerate() {
if (!appState.walletConnected) { showStatus('⚠️ Connect wallet first', 'warning'); return; }
if (appState.mode === 'img2img' && !appState.uploadedImage) {
showStatus('⚠️ Upload image first', 'warning'); return; }
var btn = document.getElementById('generateBtn');
var originalText = btn.innerHTML;
btn.disabled = true;
btn.innerHTML = '<span class="loading-spinner"></span> Generating...';
generateViaAPI()
.then(function(imageUrl) {
btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
return addWatermark(imageUrl);
})
.then(function(processedUrl) {
btn.innerHTML = '<span class="loading-spinner"></span> Finalizing...';
setTimeout(function() {
var nftId = '#' + (Math.floor(Math.random() * 9000) + 1000).toString().padStart(4, '0');
var txHash = '0x';
for (var i = 0; i < 64; i++) {
txHash += Math.floor(Math.random() * 16).toString(16);
}
appState.generatedData = {
originalUrl: appState.uploadedImage ? URL.createObjectURL(appState.uploadedImage) : null,
generatedUrl: processedUrl,
nftId: nftId,
txHash: txHash
};
if (appState.mode === 'img2img') {
document.getElementById('originalCard').style.display = 'block';
document.getElementById('originalImage').src = appState.generatedData.originalUrl;
} else {
document.getElementById('originalCard').style.display = 'none';
}
document.getElementById('generatedImage').src = processedUrl;
document.getElementById('nftId').textContent = nftId;
document.getElementById('resultSection').classList.add('show');
document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
showStatus('✅ Generated successfully via Leonardo.ai!', 'success');
btn.innerHTML = originalText;
btn.disabled = false;
}, 500);
})
.catch(function(error) {
console.error('Error:', error);
showStatus('❌ ' + error.message, 'error');
btn.innerHTML = originalText;
btn.disabled = false;
});
}
function handleDownload() {
if (!appState.generatedData) return;
var link = document.createElement('a');
link.download = 'gradient-avatar-' + appState.generatedData.nftId + '.png';
link.href = appState.generatedData.generatedUrl;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showStatus('📥 Download started!', 'success', 'mintStatus');
}
function handleCopyHash() {
if (!appState.generatedData) return;
navigator.clipboard.writeText(appState.generatedData.txHash)
.then(function() { showStatus('🔗 Hash copied!', 'success', 'mintStatus'); })
.catch(function() { showStatus('❌ Copy failed', 'error', 'mintStatus'); });
}
function connectWallet() {
var btn = document.getElementById('connectWalletBtn');
if (typeof window.ethereum === 'undefined') {
showStatus('❌ Install MetaMask', 'error');
window.open('https://metamask.io', '_blank');
return;
}
showStatus('Connecting...', 'info');
window.ethereum.request({ method: 'eth_requestAccounts' })
.then(function(accounts) {
return window.ethereum.request({ method: 'eth_chainId' });
})
.then(function(chainId) {
if (chainId !== '0x14a34') {
return window.ethereum.request({
method: 'wallet_switchEthereumChain',
params: [{ chainId: '0x14a34' }]
});
}
})
.then(function() {
appState.walletConnected = true;
btn.textContent = '✅ Connected';
btn.classList.add('connected');
showStatus('✅ Wallet connected!', 'success');
})
.catch(function(error) {
console.error('Wallet error:', error);
showStatus('❌ Connection failed', 'error');
});
}
function showStatus(message, type, elementId) {
elementId = elementId || 'statusMessage';
var el = document.getElementById(elementId);
el.innerHTML = message;
el.className = 'status-message status-' + type + ' show';
if (type !== 'error') {
setTimeout(function() { el.classList.remove('show'); }, 6000);
}
}
</script>
</body>
</html>
