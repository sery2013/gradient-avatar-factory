<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GradientAvatar Factory | OpenGradient</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
background: #0A0F19;
color: #FFFFFF;
min-height: 100vh;
padding: 20px;
}
.container { max-width: 1000px; margin: 0 auto; }
header {
background: rgba(18, 26, 38, 0.9);
border: 1px solid #1E2A3A;
border-radius: 12px;
padding: 20px;
margin-bottom: 30px;
}
.header-top {
display: flex;
justify-content: space-between;
align-items: center;
flex-wrap: wrap;
gap: 15px;
}
.logo { font-size: 24px; font-weight: 700; cursor: pointer; }
.logo:hover { transform: scale(1.02); }
.logo span { color: #51CAD3; }
.btn-connect {
padding: 10px 20px;
background: transparent;
border: 1px solid #51CAD3;
color: #51CAD3;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
}
.btn-connect:hover { background: rgba(81, 202, 211, 0.1); }
.btn-connect.connected {
background: rgba(81, 202, 211, 0.2);
border-color: #00ff9d;
color: #00ff9d;
}
.main-card {
background: #121A26;
border: 1px solid #1E2A3A;
border-radius: 16px;
padding: 30px;
margin-bottom: 20px;
}
.main-card h2 {
font-size: 22px;
margin-bottom: 24px;
display: flex;
align-items: center;
gap: 10px;
}
.mode-tabs {
display: flex;
gap: 10px;
margin-bottom: 24px;
}
.mode-tab {
flex: 1;
padding: 12px;
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 8px;
color: #A0B3C6;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.mode-tab.active {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.1);
color: #51CAD3;
}
.upload-zone {
border: 2px dashed #1E2A3A;
border-radius: 12px;
padding: 50px 20px;
text-align: center;
cursor: pointer;
transition: all 0.3s;
background: rgba(151, 222, 237, 0.03);
margin-bottom: 24px;
display: none;
}
.upload-zone.show { display: block; }
.upload-zone:hover {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.08);
}
.upload-zone.has-image {
border-style: solid;
border-color: #51CAD3;
padding: 10px;
}
.upload-icon { font-size: 56px; margin-bottom: 12px; }
.preview-image {
max-width: 100%;
max-height: 250px;
border-radius: 8px;
display: none;
}
.upload-zone.has-image .upload-icon,
.upload-zone.has-image p { display: none; }
.upload-zone.has-image .preview-image { display: block; }
.section-title {
font-size: 16px;
color: #A0B3C6;
margin-bottom: 12px;
display: block;
}
.style-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
gap: 12px;
margin-bottom: 24px;
}
.style-btn {
padding: 10px;
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 8px;
cursor: pointer;
transition: all 0.2s;
text-align: center;
font-size: 12px;
}
.style-btn:hover, .style-btn.active {
border-color: #51CAD3;
background: rgba(81, 202, 211, 0.1);
transform: translateY(-2px);
}
.style-preview {
width: 100%;
height: 45px;
border-radius: 4px;
margin-bottom: 6px;
}
textarea {
width: 100%;
padding: 14px;
background: #0A0F19;
border: 1px solid #1E2A3A;
border-radius: 8px;
color: #FFFFFF;
font-family: inherit;
resize: vertical;
min-height: 80px;
margin-bottom: 20px;
}
textarea:focus { outline: none; border-color: #51CAD3; }
.options-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 24px;
padding: 14px;
background: #0A0F19;
border-radius: 8px;
cursor: pointer;
}
.checkbox {
width: 20px;
height: 20px;
border: 2px solid #1E2A3A;
border-radius: 4px;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
flex-shrink: 0;
}
.checkbox.checked {
background: #51CAD3;
border-color: #51CAD3;
}
.checkbox.checked::after {
content: '✓';
color: #0A0F19;
font-weight: bold;
}
.btn-generate {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, #51CAD3, #97DEED);
border: none;
border-radius: 10px;
color: #0A0F19;
font-weight: 700;
font-size: 16px;
cursor: pointer;
transition: all 0.3s;
}
.btn-generate:hover:not(:disabled) {
transform: translateY(-2px);
box-shadow: 0 8px 25px rgba(81, 202, 211, 0.4);
}
.btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
.result-section { display: none; }
.result-section.show { display: block; animation: fadeIn 0.5s; }
@keyframes fadeIn {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}
.result-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 20px;
}
.result-card {
background: #0A0F19;
border: 2px solid #1E2A3A;
border-radius: 12px;
padding: 16px;
text-align: center;
}
.result-card img {
max-width: 100%;
border-radius: 8px;
margin-bottom: 10px;
}
.result-actions {
display: flex;
gap: 12px;
flex-wrap: wrap;
}
.btn-action {
flex: 1;
min-width: 140px;
padding: 12px 20px;
background: transparent;
border: 1px solid #51CAD3;
color: #51CAD3;
border-radius: 8px;
cursor: pointer;
font-weight: 600;
transition: all 0.2s;
}
.btn-action:hover { background: rgba(81, 202, 211, 0.1); }
.status-message {
padding: 14px;
border-radius: 8px;
margin-top: 16px;
display: none;
text-align: center;
}
.status-message.show { display: block; animation: slideIn 0.3s; }
@keyframes slideIn {
from { opacity: 0; transform: translateY(-10px); }
to { opacity: 1; transform: translateY(0); }
}
.status-success {
background: rgba(0, 255, 157, 0.1);
border: 1px solid #00ff9d;
color: #00ff9d;
}
.status-error {
background: rgba(255, 107, 107, 0.1);
border: 1px solid #ff6b6b;
color: #ff6b6b;
}
.status-info {
background: rgba(81, 202, 211, 0.1);
border: 1px solid #51CAD3;
color: #51CAD3;
}
.loading-spinner {
display: inline-block;
width: 20px;
height: 20px;
border: 3px solid rgba(255,255,255,0.3);
border-radius: 50%;
border-top-color: #fff;
animation: spin 1s linear infinite;
margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
footer {
margin-top: 40px;
padding: 20px;
text-align: center;
color: #6B7F94;
border-top: 1px solid #1E2A3A;
}
footer a { color: #97DEED; text-decoration: none; }
@media (max-width: 768px) {
.result-grid { grid-template-columns: 1fr; }
.style-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>
<div class="container">
<header>
<div class="header-top">
<div class="logo" id="siteLogo">🎨 Gradient<span>Avatar</span> Factory</div>
<button class="btn-connect" id="connectWalletBtn">🔗 Connect Wallet</button>
</div>
</header>

<div class="main-card">
<h2>🎨 Create Your AI Avatar</h2>

<!-- Mode Tabs -->
<div class="mode-tabs">
<button class="mode-tab active" data-mode="text2img">📝 Text to Image</button>
<button class="mode-tab" data-mode="img2img">🖼️ Image to Image</button>
</div>

<!-- Upload Zone (for img2img) -->
<div class="upload-zone" id="uploadZone">
<input type="file" id="imageInput" accept="image/*" style="display: none;">
<div class="upload-icon">📁</div>
<p><strong>Upload your character photo</strong></p>
<p style="color: #6B7F94; font-size: 14px;">PNG, JPG up to 10MB</p>
<img id="previewImage" class="preview-image" alt="Preview">
</div>

<label class="section-title">Choose Style</label>
<div class="style-grid" id="styleGrid"></div>

<label class="section-title">Custom Prompt (REQUIRED)</label>
<textarea id="promptInput" placeholder="Example: cyberpunk frog character with neon lights, futuristic armor"></textarea>

<div class="options-row" id="watermarkOption">
<div class="checkbox" id="watermarkCheckbox"></div>
<div class="checkbox-label">
<strong>Add OpenGradient Watermark</strong>
<div style="color: #6B7F94; font-size: 13px;">Overlay "OPG" logo</div>
</div>
</div>

<button class="btn-generate" id="generateBtn">✨ Generate Avatar</button>
<div id="statusMessage" class="status-message"></div>
</div>

<div class="main-card result-section" id="resultSection">
<h2>✅ Generation Complete!</h2>
<div class="result-grid">
<div class="result-card" id="originalCard" style="display:none;">
<div style="color: #6B7F94; font-size: 13px; margin-bottom: 8px;">Original</div>
<img id="originalImage" alt="Original">
</div>
<div class="result-card">
<div style="color: #6B7F94; font-size: 13px; margin-bottom: 8px;">Generated</div>
<img id="generatedImage" alt="Generated">
<div style="color: #51CAD3; font-weight: 600; margin-top: 8px;" id="nftId">#0000</div>
</div>
</div>
<div class="result-actions">
<button class="btn-action" id="downloadBtn">📥 Download PNG</button>
<button class="btn-action" id="copyHashBtn">🔗 Copy Hash</button>
</div>
</div>

<footer>
<p>Powered by Leonardo.ai • Built for <a href="https://opengradient.ai" target="_blank">OpenGradient</a></p>
</footer>
</div>

<script>
// === КОНФИГУРАЦИЯ ===
var STYLES = [
{ id: 'cyberpunk', name: 'Cyberpunk', gradient: ['#ff00ff', '#00ffff'], prompt: 'cyberpunk neon futuristic' },
{ id: 'anime', name: 'Anime', gradient: ['#ff6b9d', '#c445ff'], prompt: 'anime japanese animation' },
{ id: 'pixel', name: 'Pixel Art', gradient: ['#00ff9d', '#00b8ff'], prompt: 'pixel art 8bit retro' },
{ id: 'minimal', name: 'Minimal', gradient: ['#a0a0a0', '#ffffff'], prompt: 'minimalist clean modern' },
{ id: 'neon', name: 'Neon', gradient: ['#39ff14', '#ff00ff', '#00ffff'], prompt: 'neon glow electric' },
{ id: 'retro', name: 'Retro', gradient: ['#ff6b6b', '#feca57'], prompt: 'retro vintage 80s' },
{ id: 'fantasy', name: 'Fantasy', gradient: ['#5f27cd', '#341f97'], prompt: 'fantasy magical mystical' },
{ id: 'scifi', name: 'Sci-Fi', gradient: ['#00d2d3', '#54a0ff'], prompt: 'science fiction futuristic' },
{ id: 'noir', name: 'Noir', gradient: ['#2d3436', '#636e72'], prompt: 'film noir black white' },
{ id: 'vaporwave', name: 'Vaporwave', gradient: ['#ff9ff3', '#54a0ff', '#feca57'], prompt: 'vaporwave pastel' },
{ id: 'nature', name: 'Nature', gradient: ['#1dd1a1', '#10ac84'], prompt: 'nature organic earthy' },
{ id: 'sunset', name: 'Sunset', gradient: ['#ff9f43', '#ee5a24', '#f368e0'], prompt: 'sunset warm golden' },
{ id: 'ocean', name: 'Ocean', gradient: ['#2e86de', '#10ac84', '#54a0ff'], prompt: 'ocean waves deep blue' },
{ id: 'fire', name: 'Fire', gradient: ['#ff6348', '#ffa502', '#ff7f50'], prompt: 'fire flames burning' },
{ id: 'galaxy', name: 'Galaxy', gradient: ['#341f97', '#5f27cd', '#ff9ff3'], prompt: 'galaxy stars cosmic' },
{ id: 'forest', name: 'Forest', gradient: ['#26de81', '#20bf6b', '#0fb9b1'], prompt: 'forest green nature' },
{ id: 'cosmic', name: 'Cosmic', gradient: ['#fd79a8', '#a29bfe', '#74b9ff'], prompt: 'cosmic ethereal mystical' },
{ id: 'gold', name: 'Gold', gradient: ['#ffd32a', '#f368e0', '#ff9f43'], prompt: 'golden luxury elegant' }
];

var appState = {
mode: 'text2img',
walletConnected: false,
uploadedImage: null,
uploadedImageBase64: null,
selectedStyle: 'cyberpunk',
addWatermark: false,
generatedData: null
};

// === ИНИЦИАЛИЗАЦИЯ ===
document.addEventListener('DOMContentLoaded', function() {
console.log('✅ App loaded!');
renderStyleGrid();
setupEventListeners();
});

// Клик по логотипу
document.getElementById('siteLogo').addEventListener('click', function() {
location.reload();
});

// === РЕНДЕР СТИЛЕЙ ===
function renderStyleGrid() {
var grid = document.getElementById('styleGrid');
var html = '';
for (var i = 0; i < STYLES.length; i++) {
var style = STYLES[i];
var active = style.id === appState.selectedStyle ? 'active' : '';
html += '<button class="style-btn ' + active + '" data-style="' + style.id + '">';
html += '<div class="style-preview" style="background: linear-gradient(135deg, ' + style.gradient.join(', ') + ')"></div>';
html += '<div>' + style.name + '</div></button>';
}
grid.innerHTML = html;
console.log('✅ Styles rendered:', STYLES.length);
}

// === СОБЫТИЯ ===
function setupEventListeners() {
// Переключение режимов
var modeTabs = document.querySelectorAll('.mode-tab');
for (var i = 0; i < modeTabs.length; i++) {
modeTabs[i].addEventListener('click', function() {
for (var j = 0; j < modeTabs.length; j++) {
modeTabs[j].classList.remove('active');
}
this.classList.add('active');
appState.mode = this.dataset.mode;
var uploadZone = document.getElementById('uploadZone');
if (appState.mode === 'img2img') {
uploadZone.classList.add('show');
} else {
uploadZone.classList.remove('show');
}
console.log('Mode:', appState.mode);
});
}

// Загрузка изображения
var uploadZone = document.getElementById('uploadZone');
var imageInput = document.getElementById('imageInput');

uploadZone.addEventListener('click', function() { imageInput.click(); });
uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = '#51CAD3'; });
uploadZone.addEventListener('dragleave', function() { this.style.borderColor = '#1E2A3A'; });
uploadZone.addEventListener('drop', function(e) {
e.preventDefault();
this.style.borderColor = '#1E2A3A';
handleImageUpload(e.dataTransfer.files[0]);
});
imageInput.addEventListener('change', function(e) { handleImageUpload(e.target.files[0]); });

// Выбор стиля
document.getElementById('styleGrid').addEventListener('click', function(e) {
var btn = e.target.closest('.style-btn');
if (btn) {
var buttons = document.querySelectorAll('.style-btn');
for (var i = 0; i < buttons.length; i++) {
buttons[i].classList.remove('active');
}
btn.classList.add('active');
appState.selectedStyle = btn.dataset.style;
console.log('Style:', appState.selectedStyle);
}
});

// Водяной знак
document.getElementById('watermarkOption').addEventListener('click', function() {
appState.addWatermark = !appState.addWatermark;
var checkbox = document.getElementById('watermarkCheckbox');
if (appState.addWatermark) {
checkbox.classList.add('checked');
} else {
checkbox.classList.remove('checked');
}
});

// Кнопки
document.getElementById('generateBtn').addEventListener('click', handleGenerate);
document.getElementById('downloadBtn').addEventListener('click', handleDownload);
document.getElementById('copyHashBtn').addEventListener('click', handleCopyHash);
document.getElementById('connectWalletBtn').addEventListener('click', connectWallet);
}

// === ЗАГРУЗКА ИЗОБРАЖЕНИЯ ===
function handleImageUpload(file) {
if (!file || !file.type.startsWith('image/')) {
showStatus('Please select a valid image', 'error');
return;
}
if (file.size > 10 * 1024 * 1024) {
showStatus('Image must be under 10MB', 'error');
return;
}
appState.uploadedImage = file;
var reader = new FileReader();
reader.onload = function(e) {
document.getElementById('previewImage').src = e.target.result;
document.getElementById('uploadZone').classList.add('has-image');
appState.uploadedImageBase64 = e.target.result.split(',')[1];
showStatus('✅ Image loaded!', 'success');
};
reader.readAsDataURL(file);
}

// === ГЕНЕРАЦИЯ (POLLINATIONS - БЕСПЛАТНО) ===
function generateAIImage(prompt, style) {
return new Promise(function(resolve, reject) {
var seed = Math.floor(Math.random() * 10000);
var fullPrompt = encodeURIComponent(prompt + ', ' + style.prompt + ', high quality, detailed');
var imageUrl = 'https://image.pollinations.ai/prompt/' + fullPrompt + '?width=512&height=512&seed=' + seed + '&nologo=true';

console.log('🎨 Generating:', fullPrompt);
showStatus('🤖 AI is generating... (15-30 seconds)', 'info');

var img = new Image();
img.crossOrigin = 'anonymous';
var timeout = setTimeout(function() {
reject(new Error('Timeout. Please try again.'));
}, 30000);

img.onload = function() {
clearTimeout(timeout);
console.log('✅ Generated!');
resolve(imageUrl);
};
img.onerror = function() {
clearTimeout(timeout);
reject(new Error('Failed to generate'));
};
img.src = imageUrl;
});
}

// === ВОДЯНОЙ ЗНАК ===
function addWatermark(imageUrl) {
return new Promise(function(resolve) {
var img = new Image();
img.crossOrigin = 'anonymous';
img.onload = function() {
var canvas = document.createElement('canvas');
canvas.width = img.width;
canvas.height = img.height;
var ctx = canvas.getContext('2d');
ctx.drawImage(img, 0, 0);
if (appState.addWatermark) {
ctx.save();
ctx.globalAlpha = 0.35;
ctx.fillStyle = '#51CAD3';
ctx.font = 'bold 48px Inter, sans-serif';
ctx.textAlign = 'right';
ctx.textBaseline = 'bottom';
ctx.fillText('OPG', canvas.width - 20, canvas.height - 20);
ctx.restore();
}
resolve(canvas.toDataURL('image/png'));
};
img.onerror = function() { resolve(imageUrl); };
img.src = imageUrl;
});
}

// === ГЛАВНАЯ ФУНКЦИЯ ===
function handleGenerate() {
var prompt = document.getElementById('promptInput').value.trim();
if (!prompt) {
showStatus('⚠️ Please enter a prompt', 'warning');
return;
}
if (!appState.walletConnected) {
showStatus('⚠️ Connect wallet first', 'warning');
return;
}
if (appState.mode === 'img2img' && !appState.uploadedImage) {
showStatus('⚠️ Upload image first', 'warning');
return;
}

var btn = document.getElementById('generateBtn');
var originalText = btn.innerHTML;
btn.disabled = true;

var selectedStyle = null;
for (var i = 0; i < STYLES.length; i++) {
if (STYLES[i].id === appState.selectedStyle) {
selectedStyle = STYLES[i];
break;
}
}

btn.innerHTML = '<span class="loading-spinner"></span> Generating...';

generateAIImage(prompt, selectedStyle)
.then(function(imageUrl) {
btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
return addWatermark(imageUrl);
})
.then(function(processedUrl) {
btn.innerHTML = '<span class="loading-spinner"></span> Finalizing...';
setTimeout(function() {
var nftId = '#' + (Math.floor(Math.random() * 9000) + 1000).toString().padStart(4, '0');
var txHash = '0x' + Array(64).fill(0).map(function() { return Math.floor(Math.random() * 16).toString(16); }).join('');

appState.generatedData = {
originalUrl: appState.uploadedImage ? URL.createObjectURL(appState.uploadedImage) : null,
generatedUrl: processedUrl,
nftId: nftId,
txHash: txHash
};

if (appState.mode === 'img2img') {
document.getElementById('originalCard').style.display = 'block';
document.getElementById('originalImage').src = appState.generatedData.originalUrl;
} else {
document.getElementById('originalCard').style.display = 'none';
}

document.getElementById('generatedImage').src = processedUrl;
document.getElementById('nftId').textContent = nftId;
document.getElementById('resultSection').classList.add('show');
document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

showStatus('✅ Generated successfully!', 'success');
btn.innerHTML = originalText;
btn.disabled = false;
}, 500);
})
.catch(function(error) {
console.error('Error:', error);
showStatus('❌ ' + error.message, 'error');
btn.innerHTML = originalText;
btn.disabled = false;
});
}

function handleDownload() {
if (!appState.generatedData) return;
var link = document.createElement('a');
link.download = 'gradient-avatar-' + appState.generatedData.nftId + '.png';
link.href = appState.generatedData.generatedUrl;
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
showStatus('📥 Download started!', 'success');
}

function handleCopyHash() {
if (!appState.generatedData) return;
navigator.clipboard.writeText(appState.generatedData.txHash)
.then(function() { showStatus('🔗 Hash copied!', 'success'); })
.catch(function() { showStatus('❌ Copy failed', 'error'); });
}

function connectWallet() {
var btn = document.getElementById('connectWalletBtn');
if (typeof window.ethereum === 'undefined') {
showStatus('❌ Install MetaMask', 'error');
window.open('https://metamask.io', '_blank');
return;
}
showStatus('Connecting...', 'info');
window.ethereum.request({ method: 'eth_requestAccounts' })
.then(function(accounts) {
return window.ethereum.request({ method: 'eth_chainId' });
})
.then(function(chainId) {
if (chainId !== '0x14a34') {
return window.ethereum.request({
method: 'wallet_switchEthereumChain',
params: [{ chainId: '0x14a34' }]
});
}
})
.then(function() {
appState.walletConnected = true;
btn.textContent = '✅ Connected';
btn.classList.add('connected');
showStatus('✅ Wallet connected!', 'success');
})
.catch(function(error) {
console.error(error);
showStatus('❌ Connection failed', 'error');
});
}

function showStatus(message, type) {
var el = document.getElementById('statusMessage');
el.innerHTML = message;
el.className = 'status-message status-' + type + ' show';
if (type !== 'error') {
setTimeout(function() { el.classList.remove('show'); }, 5000);
}
}
</script>
</body>
</html>
